<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1c1a17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Aide</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">

    <!-- ── Masthead ─────────────────────────────────────────────────────────── -->
    <header class="masthead">
        <div class="masthead-title">Aide</div>
        <div class="masthead-date" id="masthead-date"></div>
        <div class="masthead-right">
            <span class="masthead-user" id="masthead-user"></span>
            <button class="masthead-theme-btn" id="theme-toggle-btn" aria-label="Toggle theme">☾</button>
            <button class="masthead-sync-btn" id="sync-btn">↻ Sync</button>
        </div>
    </header>

    <!-- ── Sidenav ──────────────────────────────────────────────────────────── -->
    <nav class="sidenav">
        <div class="nav-section">
            <div class="nav-item active" data-view="dashboard">Dashboard</div>
            <div class="nav-item" data-view="digests" id="nav-digests">
                Digests <span class="nav-badge-gray" id="badge-digests"></span>
            </div>
            <div class="nav-item" data-view="calendar">Calendar</div>
        </div>
        <div class="nav-section">
            <div class="nav-label">Account</div>
            <div class="nav-item" data-view="settings">Google</div>
        </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────────────────── -->
    <main class="main">

        <!-- Dashboard view -->
        <div class="view active" id="view-dashboard">

            <!-- Metric strip -->
            <div class="metric-strip">
                <div class="metric-card">
                    <div class="metric-value" id="m-today">—</div>
                    <div class="metric-label">Events today</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="m-week">—</div>
                    <div class="metric-label">This week</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="m-digests">—</div>
                    <div class="metric-label">Digests</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value metric-value--ts" id="m-sync">—</div>
                    <div class="metric-label">Last sync</div>
                </div>
            </div>

            <!-- Two-column body -->
            <div class="dash-grid">
                <div>
                    <div class="section-head">
                        <div class="section-title">Schedule</div>
                        <button class="section-action" id="dash-cal-link">all events →</button>
                    </div>
                    <div id="dash-schedule">
                        <div class="placeholder-row"><span class="spinner"></span></div>
                    </div>
                </div>
                <div>
                    <div class="section-head">
                        <div class="section-title">Recent Digests</div>
                        <button class="section-action" id="dash-digests-link">all →</button>
                    </div>
                    <div id="dash-digests">
                        <div class="placeholder-row"><span class="spinner"></span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Digests view -->
        <div class="view" id="view-digests">
            <div class="section-head">
                <div class="section-title">Digests</div>
                <div class="section-count" id="digests-count"></div>
                <button class="section-action" id="sync-digests-btn">↻ Sync</button>
            </div>
            <div id="digests-list">
                <div class="placeholder-row"><span class="spinner"></span></div>
            </div>
        </div>

        <!-- Calendar view -->
        <div class="view" id="view-calendar">
            <div class="cal-toolbar">
                <div class="cal-nav-group">
                    <button class="cal-nav-btn" id="cal-prev-btn">‹</button>
                    <span class="cal-month-label" id="cal-month-label"></span>
                    <button class="cal-nav-btn" id="cal-next-btn">›</button>
                </div>
                <div class="cal-toolbar-right">
                    <span class="section-count" id="calendar-count"></span>
                    <button class="section-action" id="sync-calendar-btn">↻ Sync</button>
                </div>
            </div>
            <div class="cal-month-grid">
                <div id="cal-grid-header" class="cal-grid-header"></div>
                <div id="cal-grid" class="cal-grid"></div>
            </div>
            <div class="cal-day-panel" id="cal-day-panel">
                <div class="placeholder-row"><span class="spinner"></span></div>
            </div>
        </div>

        <!-- Settings view -->
        <div class="view" id="view-settings">
            <div class="section-head"><div class="section-title">Google Account</div></div>
            <div id="google-status-block" style="font-family:var(--mono);font-size:12px;color:var(--ink3);margin-bottom:20px">
                Checking connection…
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap">
                <a href="/integrations/google/auth" class="settings-btn-primary">Reconnect Google →</a>
                <button id="signout-btn" class="settings-btn-ghost">Sign out</button>
            </div>
        </div>

        <!-- Event detail view -->
        <div class="view" id="view-event">
            <div class="email-detail-header">
                <button class="back-btn" id="event-back-btn">← Back</button>
            </div>
            <div class="email-detail-subject" id="event-detail-title"></div>
            <div class="event-detail-time" id="event-detail-time"></div>
            <div class="event-detail-fields" id="event-detail-fields"></div>
        </div>

        <!-- Email detail view -->
        <div class="view" id="view-email">
            <div class="email-detail-header">
                <button class="back-btn" id="email-back-btn">← Back</button>
            </div>
            <div class="email-detail-subject" id="email-detail-subject"></div>
            <div class="email-detail-meta" id="email-detail-meta"></div>
            <div class="email-detail-body" id="email-detail-body"></div>
        </div>

    </main>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
