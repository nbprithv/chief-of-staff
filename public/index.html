<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1c1a17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>dashboard</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">

    <!-- ── Masthead ─────────────────────────────────────────────────────────── -->
    <header class="masthead">
        <div class="masthead-title">dashboard</div>
        <div class="masthead-date" id="masthead-date"></div>
        <div class="masthead-right">
            <span class="masthead-user" id="masthead-user"></span>
            <button class="masthead-sync-btn" id="sync-btn">↻ Sync</button>
        </div>
    </header>

    <!-- ── Sidenav ──────────────────────────────────────────────────────────── -->
    <nav class="sidenav">
        <div class="nav-section">
            <div class="nav-item active" data-view="dashboard">Dashboard</div>
            <div class="nav-item" data-view="digests" id="nav-digests">
                Digests <span class="nav-badge-gray" id="badge-digests"></span>
            </div>
            <div class="nav-item" data-view="calendar">Calendar</div>
        </div>
        <div class="nav-section">
            <div class="nav-label">Account</div>
            <div class="nav-item" data-view="settings">Google</div>
        </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────────────────── -->
    <main class="main">

        <!-- Dashboard view -->
        <div class="view active" id="view-dashboard">

            <!-- Metric strip -->
            <div class="metric-strip">
                <div class="metric-card">
                    <div class="metric-value" id="m-today">—</div>
                    <div class="metric-label">Events today</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="m-week">—</div>
                    <div class="metric-label">This week</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="m-digests">—</div>
                    <div class="metric-label">Digests</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value metric-value--ts" id="m-sync">—</div>
                    <div class="metric-label">Last sync</div>
                </div>
            </div>

            <!-- Two-column body -->
            <div class="dash-grid">
                <div>
                    <div class="section-head">
                        <div class="section-title">Schedule</div>
                        <button class="section-action" id="dash-cal-link">all events →</button>
                    </div>
                    <div id="dash-schedule">
                        <div class="placeholder-row"><span class="spinner"></span></div>
                    </div>
                </div>
                <div>
                    <div class="section-head">
                        <div class="section-title">Recent Digests</div>
                        <button class="section-action" id="dash-digests-link">all →</button>
                    </div>
                    <div id="dash-digests">
                        <div class="placeholder-row"><span class="spinner"></span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Digests view -->
        <div class="view" id="view-digests">
            <div class="section-head">
                <div class="section-title">Digests</div>
                <div class="section-count" id="digests-count"></div>
                <button class="section-action" id="sync-digests-btn">↻ Sync</button>
            </div>
            <div id="digests-list">
                <div class="placeholder-row"><span class="spinner"></span></div>
            </div>
        </div>

        <!-- Calendar view -->
        <div class="view" id="view-calendar">
            <div class="section-head">
                <div class="section-title">Calendar</div>
                <div class="section-count" id="calendar-count"></div>
                <button class="section-action" id="sync-calendar-btn">↻ Sync</button>
            </div>
            <div id="calendar-list">
                <div class="placeholder-row"><span class="spinner"></span></div>
            </div>
        </div>

        <!-- Settings view -->
        <div class="view" id="view-settings">
            <div class="section-head"><div class="section-title">Google Account</div></div>
            <div id="google-status-block" style="font-family:var(--mono);font-size:12px;color:var(--ink3);margin-bottom:20px">
                Checking connection…
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap">
                <a href="/integrations/google/auth"
                   style="display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:var(--ink);color:#f0ece4;border-radius:2px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;text-decoration:none;transition:background 0.15s"
                   onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background='var(--ink)'">
                    Reconnect Google →
                </a>
                <button id="signout-btn"
                   style="display:inline-flex;align-items:center;padding:9px 18px;background:transparent;color:var(--ink3);border:1px solid var(--rule);border-radius:2px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;transition:all 0.15s"
                   onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
                   onmouseout="this.style.borderColor='var(--rule)';this.style.color='var(--ink3)'">
                    Sign out
                </button>
            </div>
        </div>

    </main>
</div>

<!-- ── Digest modal ───────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="digest-modal">
    <div class="modal-panel">
        <div class="modal-header">
            <div class="modal-title" id="modal-subject"></div>
            <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-body" id="modal-body"></div>
        <iframe class="modal-iframe" id="modal-iframe" sandbox="allow-same-origin" title="Email content"></iframe>
    </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
