<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">

    <!-- ── Masthead ─────────────────────────────────────────────────────────── -->
    <header class="masthead">
        <div class="masthead-title">dashboard</div>
        <div class="masthead-date" id="masthead-date"></div>
        <div class="masthead-right" id="status-bar">
            <!-- status pills injected by app.js -->
        </div>
    </header>

    <!-- ── Sidenav ──────────────────────────────────────────────────────────── -->
    <nav class="sidenav">
        <div class="nav-section">
            <div class="nav-item active" data-view="dashboard">Dashboard</div>
            <div class="nav-item" data-view="inbox" id="nav-inbox">Inbox <span class="nav-badge-gray" id="badge-inbox"></span></div>
            <div class="nav-item" data-view="calendar">Calendar</div>
        </div>
        <div class="nav-section">
            <div class="nav-label">Settings</div>
            <div class="nav-item" data-view="settings">Google</div>
        </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────────────────── -->
    <main class="main">

        <!-- Dashboard view (default) -->
        <div class="view active" id="view-dashboard">

            <!-- Today's events -->
            <div class="node-group">
                <div class="section-head">
                    <div class="section-title">Today</div>
                    <div class="section-count" id="today-events-count">—</div>
                    <button class="section-action" onclick="document.querySelector('[data-view=calendar]').click()">view calendar →</button>
                </div>
                <div id="today-events-list">
                    <div class="placeholder-row"><span class="spinner"></span></div>
                </div>
            </div>

            <!-- Inbox preview -->
            <div class="node-group">
                <div class="section-head">
                    <div class="section-title">Inbox</div>
                    <div class="section-count" id="inbox-preview-count">—</div>
                    <button class="section-action" onclick="document.querySelector('[data-view=inbox]').click()">view all →</button>
                </div>
                <div id="inbox-preview-list">
                    <div class="placeholder-row"><span class="spinner"></span></div>
                </div>
            </div>

        </div><!-- /view-dashboard -->

        <!-- Inbox view -->
        <div class="view" id="view-inbox">
            <div class="section-head">
                <div class="section-title">Inbox</div>
                <div class="section-count" id="inbox-full-count">—</div>
                <button class="section-action" id="sync-gmail-btn">↻ Sync Gmail</button>
            </div>
            <div id="inbox-full-list">
                <div class="placeholder-row"><span class="spinner"></span></div>
            </div>
        </div>

        <!-- Calendar view -->
        <div class="view" id="view-calendar">
            <div class="section-head">
                <div class="section-title">Calendar</div>
                <div class="section-count" id="calendar-events-count">—</div>
                <button class="section-action" id="sync-calendar-btn">↻ Sync Calendar</button>
            </div>
            <div id="calendar-events-list">
                <div class="placeholder-row"><span class="spinner"></span></div>
            </div>
        </div>

        <!-- Settings view -->
        <div class="view" id="view-settings">
            <div class="section-head"><div class="section-title">Google</div></div>
            <div id="google-status-block" style="font-family:var(--mono);font-size:12px;color:var(--ink3);margin-bottom:20px">
                Checking connection…
            </div>
            <a href="/integrations/google/auth"
               style="display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:var(--ink);color:#f0ece4;border-radius:2px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;text-decoration:none;transition:background 0.15s"
               onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background='var(--ink)'">
                Connect Google →
            </a>
        </div>

    </main>

    <!-- ── Right panel ───────────────────────────────────────────────────────── -->
    <aside class="sidepanel">

        <div class="panel-block">
            <div class="panel-block-title">This week</div>
            <div class="cal-strip" id="week-strip">
                <!-- injected by app.js -->
            </div>
            <div id="upcoming-events-panel">
                <!-- injected by app.js -->
            </div>
        </div>

        <button class="run-pipeline" id="sync-btn">
            ↻ Sync now
        </button>

    </aside>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
